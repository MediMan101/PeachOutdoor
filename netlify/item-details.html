<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Details - Peach Outdoor</title>
    
    <!-- jQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .back-link {
            max-width: 1200px;
            margin: 0 auto 20px;
        }

        .back-link a {
            color: white;
            text-decoration: none;
            font-size: 1.1em;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            border-radius: 50px;
            transition: all 0.3s;
        }

        .back-link a:hover {
            background: rgba(255,255,255,0.3);
            transform: translateX(-5px);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .item-header {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            color: white;
            padding: 40px;
            display: grid;
            grid-template-columns: 500px 1fr;
            gap: 40px;
            align-items: center;
        }

        .photo-gallery {
            width: 500px;
        }

        .main-photo {
            width: 100%;
            height: 400px;
            background: linear-gradient(135deg, #f0f0f0 0%, #e0e0e0 100%);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8em;
            border: 3px solid rgba(255,255,255,0.2);
            margin-bottom: 15px;
            overflow: hidden;
            position: relative;
        }

        .main-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
        }

        .photo-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5em;
            display: none;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .photo-nav:hover {
            background: rgba(0,0,0,0.8);
        }

        .photo-nav.prev {
            left: 15px;
        }

        .photo-nav.next {
            right: 15px;
        }

        .main-photo:hover .photo-nav {
            display: flex;
        }

        .photo-thumbnails {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 10px;
        }

        .thumbnail {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #f0f0f0 0%, #e0e0e0 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            border: 3px solid transparent;
            cursor: pointer;
            transition: all 0.3s;
            overflow: hidden;
        }

        .thumbnail:hover {
            border-color: rgba(255,255,255,0.5);
            transform: scale(1.05);
        }

        .thumbnail.active {
            border-color: #ffd700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }

        .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 5px;
        }

        .photo-count {
            text-align: center;
            margin-top: 10px;
            opacity: 0.8;
            font-size: 0.9em;
        }

        .item-info h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .item-info .manufacturer {
            font-size: 1.3em;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .item-info .series {
            font-size: 1.1em;
            opacity: 0.8;
            margin-bottom: 20px;
        }

        .item-info .description {
            font-size: 1.1em;
            line-height: 1.6;
            opacity: 0.9;
            margin-bottom: 20px;
        }

        .price-section {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
        }

        .price {
            font-size: 3em;
            font-weight: bold;
            color: #ffd700;
        }

        .stock-badge {
            background: #4caf50;
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 600;
        }

        .used-badge {
            background: #ffc107;
            color: #000;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 600;
        }

        .content-section {
            padding: 40px;
        }

        .section-title {
            font-size: 2em;
            color: #2c3e50;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 3px solid #667eea;
        }

        .specs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .spec-category {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            border: 2px solid #e0e0e0;
        }

        .spec-category h3 {
            color: #667eea;
            font-size: 1.4em;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .spec-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .spec-item:last-child {
            border-bottom: none;
        }

        .spec-label {
            font-weight: 600;
            color: #666;
        }

        .spec-value {
            color: #2c3e50;
            font-weight: 500;
            text-align: right;
        }

        .no-specs {
            text-align: center;
            padding: 60px;
            color: #666;
            background: #f8f9fa;
            border-radius: 15px;
        }

        .no-specs h3 {
            font-size: 1.8em;
            margin-bottom: 10px;
            color: #2c3e50;
        }

        .action-buttons {
            display: flex;
            gap: 20px;
            margin-top: 40px;
        }

        .btn-primary {
            flex: 1;
            padding: 18px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            flex: 1;
            padding: 18px 40px;
            background: white;
            color: #667eea;
            border: 3px solid #667eea;
            border-radius: 50px;
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-secondary:hover {
            background: #f8f9fa;
            transform: translateY(-3px);
        }

        .loading {
            text-align: center;
            padding: 60px;
            font-size: 1.5em;
            color: #666;
        }

        .error {
            text-align: center;
            padding: 60px;
            color: #e74c3c;
        }

        @media (max-width: 768px) {
            .item-header {
                grid-template-columns: 1fr;
                text-align: center;
            }

            .photo-gallery {
                width: 100%;
                margin: 0 auto;
            }

            .main-photo {
                height: 300px;
            }

            .price-section {
                justify-content: center;
            }

            .action-buttons {
                flex-direction: column;
            }

            .specs-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="back-link">
        <a href="#" onclick="goBackToInventory(); return false;">← Back to Inventory</a>
    </div>

    <div class="container">
        <div id="content">
            <div class="loading">Loading item details...</div>
        </div>
    </div>

    <script>
        let itemData = null;
        let specsData = null;

        // Get item ID from URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const itemId = urlParams.get('id');

        if (!itemId) {
            showError('No item specified');
        } else {
            loadItemDetails();
        }

        async function loadItemDetails() {
            try {
                // Load inventory data
                const inventoryResponse = await fetch('inventory.json');
                const inventory = await inventoryResponse.json();
                
                // Find the item
                itemData = inventory.find(item => item.InventoryID == itemId);
                
                if (!itemData) {
                    showError('Item not found');
                    return;
                }

                // Load specs data
                try {
                    const specsResponse = await fetch('specs.json');
                    specsData = await specsResponse.json();
                } catch (e) {
                    console.log('No specs data available');
                    specsData = [];
                }

                // Display the item
                displayItem();

            } catch (error) {
                console.error('Error loading item:', error);
                showError('Unable to load item details');
            }
        }

        function displayItem() {
            // Find specs for this model
            const specs = specsData.find(s => 
                s.Model === itemData.Model && 
                s.Manufacturer === itemData.Manufacturer
            );

            // Get photos array - support both single ImageURL and Photos array
            let photos = [];
            if (itemData.Photos && Array.isArray(itemData.Photos) && itemData.Photos.length > 0) {
                photos = itemData.Photos;
            } else if (itemData.ImageURL) {
                photos = [itemData.ImageURL];
            }

            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="item-header">
                    ${renderPhotoGallery(photos)}
                    <div class="item-info">
                        <h1>${itemData.Model || 'Model N/A'}</h1>
                        <div class="manufacturer">${itemData.Manufacturer || 'Unknown Manufacturer'}</div>
                        ${itemData.Series ? `<div class="series">Series: ${itemData.Series}</div>` : ''}
                        <div class="description">${itemData.Description || 'No description available'}</div>
                        
                        <div class="price-section">
                            <div class="price">$${(itemData.Price || 0).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                            ${itemData.Used ? '<div class="used-badge">USED</div>' : '<div class="stock-badge">NEW</div>'}
                        </div>
                    </div>
                </div>

                <div class="content-section">
                    <h2 class="section-title">Specifications</h2>
                    
                    ${specs ? displaySpecs(specs.Specs) : displayNoSpecs()}

                    ${itemData.Notes ? `
                        <h2 class="section-title" style="margin-top: 40px;">Additional Notes</h2>
                        <div class="spec-category">
                            <p style="color: #666; line-height: 1.6; font-size: 1.1em;">${itemData.Notes}</p>
                        </div>
                    ` : ''}

                    <div class="action-buttons">
                        <button class="btn-primary" onclick="chatAboutItem()">💬 Chat About This Item</button>
                        <button class="btn-secondary" onclick="goBackToInventory()">Browse More Items</button>
                    </div>
                </div>
            `;

            // Initialize photo gallery if there are multiple photos
            if (photos.length > 1) {
                initPhotoGallery(photos);
            }
        }

        function renderPhotoGallery(photos) {
            if (photos.length === 0) {
                // No photos - show placeholder
                return `
                    <div class="photo-gallery">
                        <div class="main-photo">
                            <div style="font-size: 8em;">🚜</div>
                        </div>
                    </div>
                `;
            } else if (photos.length === 1) {
                // Single photo - simple display
                return `
                    <div class="photo-gallery">
                        <div class="main-photo">
                            <img src="${photos[0]}" alt="${itemData.Model}">
                        </div>
                    </div>
                `;
            } else {
                // Multiple photos - gallery with thumbnails
                return `
                    <div class="photo-gallery">
                        <div class="main-photo" id="mainPhoto">
                            <img src="${photos[0]}" alt="${itemData.Model}" id="mainPhotoImg">
                            <button class="photo-nav prev" onclick="changePhoto(-1)">‹</button>
                            <button class="photo-nav next" onclick="changePhoto(1)">›</button>
                        </div>
                        <div class="photo-thumbnails" id="thumbnails">
                            ${photos.map((photo, index) => `
                                <div class="thumbnail ${index === 0 ? 'active' : ''}" onclick="selectPhoto(${index})">
                                    <img src="${photo}" alt="Photo ${index + 1}">
                                </div>
                            `).join('')}
                        </div>
                        <div class="photo-count">Photo 1 of ${photos.length}</div>
                    </div>
                `;
            }
        }

        let currentPhotoIndex = 0;
        let allPhotos = [];

        function initPhotoGallery(photos) {
            allPhotos = photos;
            currentPhotoIndex = 0;
        }

        function changePhoto(direction) {
            currentPhotoIndex += direction;
            if (currentPhotoIndex < 0) currentPhotoIndex = allPhotos.length - 1;
            if (currentPhotoIndex >= allPhotos.length) currentPhotoIndex = 0;
            selectPhoto(currentPhotoIndex);
        }

        function selectPhoto(index) {
            currentPhotoIndex = index;
            
            // Update main photo
            document.getElementById('mainPhotoImg').src = allPhotos[index];
            
            // Update thumbnails
            document.querySelectorAll('.thumbnail').forEach((thumb, i) => {
                if (i === index) {
                    thumb.classList.add('active');
                } else {
                    thumb.classList.remove('active');
                }
            });

            // Update counter
            const counter = document.querySelector('.photo-count');
            if (counter) {
                counter.textContent = `Photo ${index + 1} of ${allPhotos.length}`;
            }
        }

        function displaySpecs(specs) {
            let html = '<div class="specs-grid">';
            
            for (const [category, items] of Object.entries(specs)) {
                html += `
                    <div class="spec-category">
                        <h3>${category}</h3>
                `;
                
                for (const [label, value] of Object.entries(items)) {
                    html += `
                        <div class="spec-item">
                            <span class="spec-label">${label}</span>
                            <span class="spec-value">${value}</span>
                        </div>
                    `;
                }
                
                html += '</div>';
            }
            
            html += '</div>';
            return html;
        }

        function displayNoSpecs() {
            return `
                <div class="no-specs">
                    <h3>Specifications Coming Soon</h3>
                    <p>Detailed specifications for this model are being updated. Please contact us for more information.</p>
                </div>
            `;
        }

        function chatAboutItem() {
            // Try to find the Kenect iframe specifically
            const kenectIframe = document.querySelector('iframe[src*="widget.kenect.com"]');
            
            if (kenectIframe) {
                // Click the iframe to open the widget
                kenectIframe.click();
                
                // Also try clicking the parent container
                if (kenectIframe.parentElement) {
                    kenectIframe.parentElement.click();
                }
                
                return;
            }
            
            // Fallback - look for any element with kenect in the class
            const kenectElement = document.querySelector('[class*="kenect"], [id*="kenect"]');
            if (kenectElement) {
                kenectElement.click();
                return;
            }
            
            // Last resort - tell user to click Text us button
            alert('Please click the "Text us!" button to chat about this item!\n\nItem: ' + itemData.Manufacturer + ' ' + itemData.Model + '\nPrice: $' + itemData.Price.toLocaleString());
        }

        function showError(message) {
            document.getElementById('content').innerHTML = `
                <div class="error">
                    <h2>⚠️ ${message}</h2>
                    <p>Please go back and try again.</p>
                    <button class="btn-secondary" onclick="goBackToInventory()" style="margin-top: 20px;">
                        Back to Inventory
                    </button>
                </div>
            `;
        }

        function goBackToInventory() {
            const urlParams = new URLSearchParams(window.location.search);
            const returnParams = urlParams.get('return');
            
            if (returnParams) {
                window.location.href = 'inventory.html' + returnParams;
            } else {
                window.location.href = 'inventory.html';
            }
        }
    </script>
    
    <!-- Live Chat Widget -->
    <script async src='https://bit.ly/3Zyjlxs' type='text/javascript'></script>
</body>
</html>
