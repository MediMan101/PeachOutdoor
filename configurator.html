<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tractor Configurator - Peach Outdoor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .back-link {
            max-width: 900px;
            margin: 0 auto 20px;
        }

        .back-link a {
            color: white;
            text-decoration: none;
            font-size: 1.1em;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            border-radius: 50px;
            transition: all 0.3s;
        }

        .back-link a:hover {
            background: rgba(255,255,255,0.3);
            transform: translateX(-5px);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            color: white;
            padding: 30px 40px 40px;
            text-align: center;
        }

        .header-logo {
            display: block;
            margin: 0 auto 18px;
            height: 60px;
            width: auto;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .brand-badge {
            display: inline-block;
            padding: 8px 20px;
            background: rgba(255,255,255,0.2);
            border-radius: 50px;
            margin-top: 15px;
            font-size: 1.2em;
            font-weight: 600;
        }

        .content {
            padding: 40px;
        }

        .section {
            margin-bottom: 35px;
        }

        .section-title {
            font-size: 1.3em;
            color: #2c3e50;
            margin-bottom: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
        }

        .section-title::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 24px;
            background: #667eea;
            margin-right: 12px;
            border-radius: 2px;
        }

        select {
            width: 100%;
            padding: 15px;
            font-size: 1em;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        select:hover {
            border-color: #667eea;
        }

        select:focus {
            outline: none;
            border-color: #667eea;
        }

        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            padding: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
        }

        .checkbox-item:hover {
            border-color: #667eea;
            background: #f9fafb;
        }

        .checkbox-item input[type="checkbox"] {
            width: 24px;
            height: 24px;
            margin-right: 15px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .checkbox-item label {
            flex: 1;
            cursor: pointer;
            font-size: 1.1em;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .price-tag {
            color: #667eea;
            font-weight: 600;
            font-size: 1.1em;
        }

        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .radio-item {
            display: flex;
            align-items: center;
            padding: 18px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .radio-item:hover {
            border-color: #667eea;
            background: #f9fafb;
        }

        .radio-item input[type="radio"] {
            width: 20px;
            height: 20px;
            margin-right: 15px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .radio-item label {
            flex: 1;
            cursor: pointer;
            font-size: 1.05em;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .summary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            margin-top: 40px;
        }

        .summary h2 {
            font-size: 1.8em;
            margin-bottom: 20px;
            text-align: center;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            font-size: 1.05em;
        }

        .summary-item:last-child {
            border-bottom: none;
        }

        .summary-total {
            font-size: 1.8em;
            font-weight: bold;
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid rgba(255,255,255,0.3);
        }

        .quote-btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 18px 40px;
            font-size: 1.2em;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .quote-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }
            
            .content {
                padding: 25px;
            }
        }
    </style>
</head>
<body>
    <div class="back-link">
        <a href="index.html">← Back to Home</a>
    </div>

    <div class="container">
        <div class="header">
            <img src="PeachOutdoorLogo.png" alt="Peach Outdoor" class="header-logo">
            <h1>🚜 Tractor Configurator</h1>
            <p>Build your perfect tractor with custom options</p>
            <div class="brand-badge" id="brandBadge"></div>
        </div>

        <div class="content">
            <!-- Model Selection -->
            <div class="section">
                <div class="section-title">Step 1: Select Model</div>
                <select id="modelSelect">
                    <option value="">-- Select a Model --</option>
                </select>
            </div>

            <!-- Add-ons -->
            <div class="section disabled" id="addonsSection">
                <div class="section-title">Step 2: Add Equipment</div>
                <div class="checkbox-group">
                    <div class="checkbox-item">
                        <input type="checkbox" id="loader">
                        <label for="loader">
                            <span>Front End Loader</span>
                            <span class="price-tag" id="loaderPrice">+$0</span>
                        </label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="backhoe">
                        <label for="backhoe">
                            <span>Backhoe Attachment</span>
                            <span class="price-tag" id="backhoePrice">+$0</span>
                        </label>
                    </div>
                </div>
            </div>

            <!-- Tire Selection -->
            <div class="section disabled" id="tiresSection">
                <div class="section-title">Step 3: Choose Tire Type</div>
                <div class="radio-group">
                    <div class="radio-item">
                        <input type="radio" id="tireStandard" name="tires" value="0" checked>
                        <label for="tireStandard">
                            <span>Standard Agricultural Tires</span>
                            <span class="price-tag">Included</span>
                        </label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" id="tireTurf" name="tires" value="800">
                        <label for="tireTurf">
                            <span>Turf Tires (Lawn Safe)</span>
                            <span class="price-tag">+$800</span>
                        </label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" id="tireIndustrial" name="tires" value="1200">
                        <label for="tireIndustrial">
                            <span>Industrial Tires (Heavy Duty)</span>
                            <span class="price-tag">+$1,200</span>
                        </label>
                    </div>
                </div>
            </div>

            <!-- Summary -->
            <div class="summary" id="summary" style="display: none;">
                <h2>Your Configuration</h2>
                <div id="summaryDetails"></div>
                <div class="summary-total" id="totalPrice">Total: $0</div>
                
                <!-- Request Quote Button -->
                <div style="text-align: center; margin-top: 30px;">
                    <button onclick="requestQuote()" class="quote-btn" id="quoteBtn">
                        📧 Request Quote for This Configuration
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Load pricing data from JSON file
        let tractorModels = {};
        let selectedBrand = '';
        let selectedModel = null;
        let isDataLoaded = false;

        // Fetch pricing from JSON file
        async function loadPricingData() {
            try {
                const response = await fetch('pricing.json');
                tractorModels = await response.json();
                isDataLoaded = true;
                console.log('Pricing data loaded successfully');
                
                // After data loads, check URL for brand parameter
                initializeBrand();
            } catch (error) {
                console.error('Error loading pricing data:', error);
                alert('Unable to load pricing data. Please refresh the page.');
            }
        }

        // Get brand from URL parameter
        function getBrandFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            const brand = urlParams.get('brand');
            
            // Map URL parameter to actual brand names
            const brandMap = {
                'mahindra': 'Mahindra',
                'ls': 'LS',
                'badboy': 'Bad Boy'
            };
            
            return brandMap[brand] || null;
        }

        // Initialize with brand from URL
        function initializeBrand() {
            const brandFromURL = getBrandFromURL();
            
            if (brandFromURL && tractorModels[brandFromURL]) {
                selectedBrand = brandFromURL;
                document.getElementById('brandBadge').textContent = selectedBrand;
                loadModels(selectedBrand);
            } else {
                // If no valid brand in URL, redirect to home
                window.location.href = 'index.html';
            }
        }

        // Load models based on brand
        function loadModels(brand) {
            const modelSelect = document.getElementById('modelSelect');
            modelSelect.innerHTML = '<option value="">-- Select a Model --</option>';
            
            tractorModels[brand].forEach((model, index) => {
                const option = document.createElement('option');
                option.value = index;
                option.textContent = `${model.name} - $${model.price.toLocaleString()}`;
                modelSelect.appendChild(option);
            });
        }

        // Model selection
        document.getElementById('modelSelect').addEventListener('change', function() {
            if (this.value !== '') {
                selectedModel = tractorModels[selectedBrand][this.value];
                
                // Update loader and backhoe prices for this specific model
                document.getElementById('loaderPrice').textContent = `+$${selectedModel.loaderPrice.toLocaleString()}`;
                document.getElementById('backhoePrice').textContent = `+$${selectedModel.backhoePrice.toLocaleString()}`;
                
                document.getElementById('addonsSection').classList.remove('disabled');
                document.getElementById('tiresSection').classList.remove('disabled');
                document.getElementById('summary').style.display = 'block';
                updateSummary();
            } else {
                document.getElementById('addonsSection').classList.add('disabled');
                document.getElementById('tiresSection').classList.add('disabled');
                document.getElementById('summary').style.display = 'none';
            }
        });

        // Update summary when any option changes
        document.getElementById('loader').addEventListener('change', updateSummary);
        document.getElementById('backhoe').addEventListener('change', updateSummary);
        document.querySelectorAll('input[name="tires"]').forEach(radio => {
            radio.addEventListener('change', updateSummary);
        });

        function updateSummary() {
            if (!selectedModel) return;

            let total = selectedModel.price;
            let summaryHTML = `
                <div class="summary-item">
                    <span>${selectedBrand} ${selectedModel.name}</span>
                    <span>$${selectedModel.price.toLocaleString()}</span>
                </div>
            `;

            // Front End Loader
            if (document.getElementById('loader').checked) {
                const loaderPrice = selectedModel.loaderPrice;
                total += loaderPrice;
                summaryHTML += `
                    <div class="summary-item">
                        <span>Front End Loader</span>
                        <span>$${loaderPrice.toLocaleString()}</span>
                    </div>
                `;
            }

            // Backhoe
            if (document.getElementById('backhoe').checked) {
                const backhoePrice = selectedModel.backhoePrice;
                total += backhoePrice;
                summaryHTML += `
                    <div class="summary-item">
                        <span>Backhoe Attachment</span>
                        <span>$${backhoePrice.toLocaleString()}</span>
                    </div>
                `;
            }

            // Tires
            const selectedTire = document.querySelector('input[name="tires"]:checked');
            const tirePrice = parseInt(selectedTire.value);
            const tireLabel = selectedTire.nextElementSibling.querySelector('span').textContent;
            
            if (tirePrice > 0) {
                total += tirePrice;
                summaryHTML += `
                    <div class="summary-item">
                        <span>${tireLabel}</span>
                        <span>$${tirePrice.toLocaleString()}</span>
                    </div>
                `;
            } else {
                summaryHTML += `
                    <div class="summary-item">
                        <span>${tireLabel}</span>
                        <span>Included</span>
                    </div>
                `;
            }

            document.getElementById('summaryDetails').innerHTML = summaryHTML;
            document.getElementById('totalPrice').textContent = `Total: $${total.toLocaleString()}`;
        }

        // Initialize on page load
        loadPricingData();

        // Request Quote Function
        async function requestQuote() {
            if (!selectedModel) return;

            const quoteBtn = document.getElementById('quoteBtn');
            
            // Prompt for customer info
            const customerName = prompt("Please enter your name:");
            if (!customerName) return;

            const customerEmail = prompt("Please enter your email:");
            if (!customerEmail) return;

            const customerPhone = prompt("Please enter your phone number:");
            if (!customerPhone) return;

            // Disable button while sending
            quoteBtn.disabled = true;
            quoteBtn.textContent = 'Sending...';

            // Gather configuration details
            let options = '';
            
            if (document.getElementById('loader').checked) {
                options += `- Front End Loader: $${selectedModel.loaderPrice.toLocaleString()}\n`;
            }
            
            if (document.getElementById('backhoe').checked) {
                options += `- Backhoe Attachment: $${selectedModel.backhoePrice.toLocaleString()}\n`;
            }

            const selectedTire = document.querySelector('input[name="tires"]:checked');
            const tirePrice = parseInt(selectedTire.value);
            const tireLabel = selectedTire.nextElementSibling.querySelector('span').textContent;
            options += `- Tires: ${tireLabel}`;
            if (tirePrice > 0) {
                options += ` (+$${tirePrice.toLocaleString()})`;
            }

            const total = document.getElementById('totalPrice').textContent;

            // Send to Netlify Function
            try {
                const response = await fetch('/.netlify/functions/send-quote', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        customerName,
                        customerEmail,
                        customerPhone,
                        brand: selectedBrand,
                        model: selectedModel.name,
                        basePrice: `$${selectedModel.price.toLocaleString()}`,
                        options,
                        total
                    })
                });

                const result = await response.json();

                if (response.ok) {
                    alert('✓ Quote request sent successfully! We will contact you shortly.');
                } else {
                    throw new Error(result.error || 'Failed to send quote');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Sorry, there was an error sending your quote request. Please call us at (205) 280-8838.');
            } finally {
                // Re-enable button
                quoteBtn.disabled = false;
                quoteBtn.textContent = '📧 Request Quote for This Configuration';
            }
        }
    </script>
    
    <!-- Live Chat Widget -->
    <script async src='https://bit.ly/3Zyjlxs' type='text/javascript'></script>
</body>
</html>
