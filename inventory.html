<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory - Peach Outdoor</title>
    
    <!-- jQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .back-link {
            max-width: 1400px;
            margin: 0 auto 20px;
        }

        .back-link a {
            color: white;
            text-decoration: none;
            font-size: 1.1em;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            border-radius: 50px;
            transition: all 0.3s;
        }

        .back-link a:hover {
            background: rgba(255,255,255,0.3);
            transform: translateX(-5px);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .filters {
            padding: 30px 40px;
            background: #f8f9fa;
            border-bottom: 2px solid #e0e0e0;
        }

        .filter-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
        }

        .filter-group label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #2c3e50;
        }

        .filter-group input,
        .filter-group select {
            padding: 10px;
            font-size: 1em;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            transition: border-color 0.3s;
        }

        .filter-group input:focus,
        .filter-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .results-header {
            padding: 20px 40px;
            background: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e0e0e0;
        }

        .results-count {
            font-size: 1.2em;
            font-weight: 600;
            color: #2c3e50;
        }

        .view-toggle {
            display: flex;
            gap: 10px;
        }

        .view-btn {
            padding: 8px 16px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .view-btn.active {
            background: #667eea;
            color: white;
        }

        .inventory-list {
            padding: 0;
        }

        .list-header {
            display: grid;
            grid-template-columns: 80px 150px 100px 150px 120px 1fr 120px 100px;
            gap: 15px;
            padding: 15px 40px;
            background: #f8f9fa;
            border-bottom: 2px solid #e0e0e0;
            font-weight: 600;
            color: #2c3e50;
            font-size: 0.9em;
        }

        .inventory-row {
            display: grid;
            grid-template-columns: 80px 150px 100px 150px 120px 1fr 120px 100px;
            gap: 15px;
            padding: 15px 40px;
            border-bottom: 1px solid #e0e0e0;
            transition: all 0.2s;
            align-items: center;
        }

        .inventory-row:hover {
            background: #f8f9fa;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .clickable-area {
            cursor: pointer;
        }



        .row-thumbnail {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            background: linear-gradient(135deg, #f0f0f0 0%, #e0e0e0 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8em;
            color: #999;
            border: 2px solid #e0e0e0;
        }

        .row-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 6px;
        }

        .inventory-row:hover {
            background: #f8f9fa;
            transform: translateX(5px);
        }

        .row-mfg {
            font-weight: 600;
            color: #667eea;
        }

        .row-dept {
            font-size: 0.85em;
            color: #666;
        }

        .row-series {
            font-size: 0.9em;
            color: #666;
        }

        .row-model {
            font-weight: 600;
            color: #2c3e50;
            font-size: 1.05em;
        }

        .row-description {
            color: #666;
            font-size: 0.9em;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .row-price {
            font-weight: bold;
            color: #667eea;
            font-size: 1.1em;
        }

        .row-qty {
            text-align: center;
            font-weight: 600;
        }

        .used-badge {
            background: #ffc107;
            color: #000;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 600;
            display: inline-block;
        }

        .chat-btn-small {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .chat-btn-small:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        @media (max-width: 1200px) {
            .list-header,
            .inventory-row {
                grid-template-columns: 60px 120px 80px 120px 100px 1fr 100px 80px 240px;
                font-size: 0.85em;
            }
        }

        @media (max-width: 768px) {
            .list-header {
                display: none;
            }

            .inventory-row {
                grid-template-columns: 1fr;
                gap: 8px;
                padding: 15px 20px;
            }

            .row-mfg::before { content: "Manufacturer: "; font-weight: normal; }
            .row-dept::before { content: "Dept: "; font-weight: normal; }
            .row-series::before { content: "Series: "; font-weight: normal; }
            .row-model::before { content: "Model: "; font-weight: normal; }
            .row-description::before { content: "Description: "; font-weight: normal; }
            .row-price::before { content: "Price: "; font-weight: normal; }
            .row-qty::before { content: "Qty: "; font-weight: normal; }
        }

        .no-results {
            text-align: center;
            padding: 60px 40px;
            color: #666;
        }

        .no-results h2 {
            font-size: 2em;
            margin-bottom: 10px;
            color: #2c3e50;
        }

        .loading {
            text-align: center;
            padding: 60px;
            font-size: 1.2em;
            color: #666;
        }

        @media (max-width: 768px) {
            .filter-row {
                grid-template-columns: 1fr;
            }

            .list-header {
                display: none;
            }

            .inventory-row {
                grid-template-columns: 1fr;
                gap: 8px;
                padding: 15px 20px;
            }

            .row-mfg::before { content: "Manufacturer: "; font-weight: normal; }
            .row-dept::before { content: "Dept: "; font-weight: normal; }
            .row-series::before { content: "Series: "; font-weight: normal; }
            .row-model::before { content: "Model: "; font-weight: normal; }
            .row-description::before { content: "Description: "; font-weight: normal; }
            .row-price::before { content: "Price: "; font-weight: normal; }
            .row-qty::before { content: "Qty: "; font-weight: normal; }

            .results-header {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="back-link">
        <a href="index.html">← Back to Home</a>
    </div>

    <div class="container">
        <div class="header">
            <h1>🚜 Browse Our Inventory</h1>
            <p>Find the perfect equipment for your needs</p>
        </div>

        <!-- Filters -->
        <div class="filters">
            <div class="filter-row">
                <div class="filter-group">
                    <label>Search</label>
                    <input type="text" id="searchInput" placeholder="Search by model, description...">
                </div>
                <div class="filter-group">
                    <label>Manufacturer</label>
                    <select id="mfgFilter">
                        <option value="">All Manufacturers</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Condition</label>
                    <select id="conditionFilter">
                        <option value="">All</option>
                        <option value="new">New</option>
                        <option value="used">Used</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Department</label>
                    <select id="deptFilter">
                        <option value="">All Departments</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Results Header -->
        <div class="results-header">
            <div class="results-count" id="resultsCount">Loading inventory...</div>
        </div>

        <!-- Inventory List -->
        <div class="inventory-list" id="inventoryList">
            <div class="loading">Loading inventory data...</div>
        </div>
    </div>

    <script>
        let inventoryData = [];
        let filteredData = [];

        // Load inventory data
        async function loadInventory() {
            try {
                const response = await fetch('inventory.json');
                inventoryData = await response.json();
                
                // Populate filter dropdowns
                populateFilters();
                
                // Restore filter values from URL
                restoreFiltersFromURL();
                
                // Initial display with filters applied
                filteredData = inventoryData;
                filterInventory();
                
            } catch (error) {
                console.error('Error loading inventory:', error);
                document.getElementById('inventoryList').innerHTML = 
                    '<div class="no-results"><h2>Unable to load inventory</h2><p>Please try again later or call us at (205) 280-8838</p></div>';
            }
        }

        // Restore filter state from URL parameters
        function restoreFiltersFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            
            console.log('Restoring filters from URL:', window.location.search);
            
            if (urlParams.has('search')) {
                document.getElementById('searchInput').value = urlParams.get('search');
                console.log('Restored search:', urlParams.get('search'));
            }
            if (urlParams.has('mfg')) {
                document.getElementById('mfgFilter').value = urlParams.get('mfg');
                console.log('Restored mfg:', urlParams.get('mfg'));
            }
            if (urlParams.has('condition')) {
                document.getElementById('conditionFilter').value = urlParams.get('condition');
                console.log('Restored condition:', urlParams.get('condition'));
            }
            if (urlParams.has('dept')) {
                document.getElementById('deptFilter').value = urlParams.get('dept');
                console.log('Restored dept:', urlParams.get('dept'));
            }
        }

        // Populate filter dropdowns
        function populateFilters() {
            // Get unique manufacturers
            const manufacturers = [...new Set(inventoryData.map(item => item.Manufacturer))].sort();
            const mfgSelect = document.getElementById('mfgFilter');
            manufacturers.forEach(mfg => {
                if (mfg) {
                    const option = document.createElement('option');
                    option.value = mfg;
                    option.textContent = mfg;
                    mfgSelect.appendChild(option);
                }
            });

            // Get unique departments
            const departments = [...new Set(inventoryData.map(item => item.Department))].sort();
            const deptSelect = document.getElementById('deptFilter');
            departments.forEach(dept => {
                if (dept) {
                    const option = document.createElement('option');
                    option.value = dept;
                    option.textContent = dept;
                    deptSelect.appendChild(option);
                }
            });
        }

        // Display inventory
        function displayInventory() {
            const list = document.getElementById('inventoryList');
            const resultsCount = document.getElementById('resultsCount');
            
            resultsCount.textContent = `Showing ${filteredData.length} item${filteredData.length !== 1 ? 's' : ''}`;

            if (filteredData.length === 0) {
                list.innerHTML = '<div class="no-results"><h2>No items found</h2><p>Try adjusting your filters</p></div>';
                return;
            }

            // Create header row
            const headerHTML = `
                <div class="list-header">
                    <div>Image</div>
                    <div>Manufacturer</div>
                    <div>Dept</div>
                    <div>Series</div>
                    <div>Model</div>
                    <div>Description</div>
                    <div>Price</div>
                    <div>Stock</div>
                </div>
            `;

            // Create data rows
            const rowsHTML = filteredData.map(item => {
                const detailsUrl = `item-details.html?id=${item.InventoryID}${window.location.search ? '&return=' + encodeURIComponent(window.location.search) : ''}`;
                
                return `
                <div class="inventory-row">
                    <div class="row-thumbnail clickable-area" onclick="window.location.href='${detailsUrl}'">
                        ${item.PrimaryPhotoURL ? 
                            `<img src="${item.PrimaryPhotoURL}" alt="${item.Model}">` : 
                            '🚜'
                        }
                    </div>
                    <div class="row-mfg clickable-area" onclick="window.location.href='${detailsUrl}'">${item.Manufacturer || 'Unknown'}</div>
                    <div class="row-dept clickable-area" onclick="window.location.href='${detailsUrl}'">${item.Department || '-'}</div>
                    <div class="row-series clickable-area" onclick="window.location.href='${detailsUrl}'">${item.Series || '-'}</div>
                    <div class="row-model clickable-area" onclick="window.location.href='${detailsUrl}'">
                        ${item.Model || 'N/A'}
                        ${item.Used ? '<span class="used-badge">USED</span>' : ''}
                    </div>
                    <div class="row-description clickable-area" onclick="window.location.href='${detailsUrl}'" title="${item.Description || 'No description'}">${item.Description || 'No description available'}</div>
                    <div class="row-price clickable-area" onclick="window.location.href='${detailsUrl}'">${item.Web_Price != null ? '$' + item.Web_Price.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2}) : '<span style="color:#e67e22;font-weight:700;font-size:0.9em;">Call for Price</span>'}</div>
                    <div class="row-qty clickable-area" onclick="window.location.href='${detailsUrl}'">${item.QuantityAvailable || 0}</div>
                </div>
            `}).join('');


            list.innerHTML = headerHTML + rowsHTML;
        }

        // Filter inventory
        function filterInventory() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const mfgFilter = document.getElementById('mfgFilter').value;
            const conditionFilter = document.getElementById('conditionFilter').value;
            const deptFilter = document.getElementById('deptFilter').value;

            // Update URL with current filters
            const params = new URLSearchParams();
            if (searchTerm) params.set('search', searchTerm);
            if (mfgFilter) params.set('mfg', mfgFilter);
            if (conditionFilter) params.set('condition', conditionFilter);
            if (deptFilter) params.set('dept', deptFilter);
            
            const newUrl = params.toString() ? `?${params.toString()}` : window.location.pathname;
            window.history.replaceState({}, '', newUrl);
            
            console.log('Applied filters, new URL:', newUrl);

            filteredData = inventoryData.filter(item => {
                // Search filter
                const matchesSearch = !searchTerm || 
                    (item.Model && item.Model.toLowerCase().includes(searchTerm)) ||
                    (item.Description && item.Description.toLowerCase().includes(searchTerm)) ||
                    (item.Series && item.Series.toLowerCase().includes(searchTerm));

                // Manufacturer filter
                const matchesMfg = !mfgFilter || item.Manufacturer === mfgFilter;

                // Condition filter
                const matchesCondition = !conditionFilter || 
                    (conditionFilter === 'new' && !item.Used) ||
                    (conditionFilter === 'used' && item.Used);

                // Department filter
                const matchesDept = !deptFilter || item.Department === deptFilter;

                return matchesSearch && matchesMfg && matchesCondition && matchesDept;
            });

            console.log('Filtered to', filteredData.length, 'items');
            displayInventory();
        }

        // Event listeners
        document.getElementById('searchInput').addEventListener('input', filterInventory);
        document.getElementById('mfgFilter').addEventListener('change', filterInventory);
        document.getElementById('conditionFilter').addEventListener('change', filterInventory);
        document.getElementById('deptFilter').addEventListener('change', filterInventory);

        // Load inventory on page load
        loadInventory();
    </script>
    
    <!-- Live Chat Widget -->
    <script async src='https://bit.ly/3Zyjlxs' type='text/javascript'></script>
</body>
</html>
