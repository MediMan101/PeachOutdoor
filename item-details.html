<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Details - Peach Outdoor</title>

    <!-- jQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

    <style>
        /* ── Design tokens ── */
        :root {
            --charcoal-dark:  #1f1f21;
            --charcoal-mid:   #2c2c2e;
            --charcoal-light: #3a3a3c;
            --charcoal-border:#4a4a4c;
            --accent:         #e07b2a;
            --accent-hover:   #c96a1a;
            --text-primary:   #f0f0f0;
            --text-secondary: #a0a0a4;
            --text-muted:     #707074;
            --gold:           #ffd166;
            --green:          #4caf6e;
            --yellow:         #ffc107;
            --radius-sm:      8px;
            --radius-md:      12px;
            --radius-lg:      20px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--charcoal-dark);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* ── Top bar ── */
        .top-bar {
            background: var(--charcoal-mid);
            border-bottom: 1px solid var(--charcoal-border);
            padding: 14px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.95em;
            font-weight: 500;
            padding: 8px 16px;
            border: 1px solid var(--charcoal-border);
            border-radius: 50px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .back-link:hover {
            color: var(--text-primary);
            border-color: var(--accent);
            background: rgba(224,123,42,0.08);
        }

        .site-logo img {
            height: 52px;
            width: auto;
            display: block;
        }

        /* ── Main two-column layout ── */
        .product-layout {
            display: grid;
            grid-template-columns: 1fr 460px;
            gap: 0;
            max-width: 1380px;
            margin: 0 auto;
            padding: 40px 32px;
            align-items: start;
        }

        /* ── LEFT: Image gallery ── */
        .gallery-col {
            padding-right: 48px;
        }

        .main-photo-wrap {
            position: relative;
            background: var(--charcoal-mid);
            border-radius: var(--radius-lg);
            overflow: hidden;
            aspect-ratio: 4/3;
            border: 1px solid var(--charcoal-border);
            margin-bottom: 14px;
        }

        .main-photo-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: opacity 0.25s ease;
        }

        .placeholder-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            font-size: 6em;
            color: var(--text-muted);
        }

        .photo-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(31,31,33,0.75);
            color: var(--text-primary);
            border: 1px solid var(--charcoal-border);
            width: 46px;
            height: 46px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.6em;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s, background 0.2s;
            backdrop-filter: blur(6px);
        }

        .main-photo-wrap:hover .photo-nav { opacity: 1; }
        .photo-nav:hover { background: rgba(224,123,42,0.85); border-color: var(--accent); }
        .photo-nav.prev { left: 14px; }
        .photo-nav.next { right: 14px; }

        .photo-counter {
            position: absolute;
            bottom: 14px;
            right: 14px;
            background: rgba(31,31,33,0.75);
            color: var(--text-secondary);
            font-size: 0.8em;
            padding: 4px 10px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
        }

        .thumbnails-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .thumb {
            width: 82px;
            height: 68px;
            border-radius: var(--radius-sm);
            overflow: hidden;
            border: 2px solid var(--charcoal-border);
            cursor: pointer;
            transition: border-color 0.2s, transform 0.15s;
            background: var(--charcoal-mid);
            flex-shrink: 0;
        }

        .thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .thumb:hover { border-color: var(--text-secondary); transform: scale(1.04); }
        .thumb.active { border-color: var(--accent); }

        /* ── RIGHT: Sticky info panel ── */
        .info-col {
            position: sticky;
            top: 72px;
        }

        .info-panel {
            background: var(--charcoal-mid);
            border: 1px solid var(--charcoal-border);
            border-radius: var(--radius-lg);
            padding: 30px;
        }

        .item-manufacturer {
            font-size: 0.82em;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 6px;
        }

        .item-title {
            font-size: 0.92em;
            font-weight: 600;
            line-height: 1.2;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .item-series {
            font-size: 0.92em;
            color: var(--text-secondary);
            margin-bottom: 14px;
        }

        .item-description-title {
            font-size: 1.85em;
            font-weight: 700;
            line-height: 1.25;
            color: var(--text-primary);
            margin-bottom: 14px;
        }

        .item-serial {
            font-size: 0.85em;
            color: var(--text-muted);
            font-family: 'Courier New', monospace;
            letter-spacing: 0.06em;
            margin-bottom: 20px;
            padding: 7px 12px;
            background: var(--charcoal-light);
            border-radius: var(--radius-sm);
            display: inline-block;
        }

        .price-row {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .price-main {
            font-size: 2.3em;
            font-weight: 800;
            color: var(--gold);
        }

        .price-call {
            font-size: 1.35em;
            font-weight: 700;
            color: var(--gold);
        }

        .msrp-price {
            font-size: 0.95em;
            color: var(--text-muted);
            text-decoration: line-through;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .badge-new  { background: var(--green);  color: #fff; }
        .badge-used { background: var(--yellow); color: #1f1f21; }

        .info-pills {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 22px;
        }

        .pill {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: var(--charcoal-light);
            border: 1px solid var(--charcoal-border);
            border-radius: var(--radius-md);
            padding: 10px 18px;
            min-width: 85px;
        }

        .pill-label {
            font-size: 0.7em;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.09em;
            margin-bottom: 3px;
        }

        .pill-value {
            font-size: 0.92em;
            font-weight: 600;
            color: var(--text-primary);
        }

        .divider {
            border: none;
            border-top: 1px solid var(--charcoal-border);
            margin: 20px 0;
        }

        .item-description {
            font-size: 0.93em;
            line-height: 1.65;
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        .notes-box {
            background: var(--charcoal-light);
            border-left: 3px solid var(--accent);
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            padding: 12px 16px;
            font-size: 0.88em;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .btn-chat {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius-md);
            font-size: 1.05em;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-chat:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }

        .btn-back {
            width: 100%;
            padding: 14px;
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--charcoal-border);
            border-radius: var(--radius-md);
            font-size: 0.95em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-back:hover {
            border-color: var(--text-secondary);
            color: var(--text-primary);
            background: var(--charcoal-light);
        }

        /* ── Specs section (full width below) ── */
        .specs-section {
            max-width: 1380px;
            margin: 0 auto;
            padding: 0 32px 60px;
        }

        .specs-section-title {
            font-size: 1.25em;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .specs-section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--charcoal-border);
        }

        .specs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 16px;
        }

        .spec-category {
            background: var(--charcoal-mid);
            border: 1px solid var(--charcoal-border);
            border-radius: var(--radius-md);
            overflow: hidden;
        }

        .spec-category-header {
            background: var(--charcoal-light);
            padding: 12px 20px;
            font-size: 0.82em;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--accent);
            border-bottom: 1px solid var(--charcoal-border);
        }

        .spec-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 11px 20px;
            border-bottom: 1px solid var(--charcoal-border);
            gap: 16px;
        }

        .spec-item:last-child { border-bottom: none; }

        .spec-label {
            font-size: 0.88em;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .spec-value {
            font-size: 0.88em;
            color: var(--text-primary);
            font-weight: 600;
            text-align: right;
        }

        .no-specs {
            background: var(--charcoal-mid);
            border: 1px solid var(--charcoal-border);
            border-radius: var(--radius-md);
            padding: 50px;
            text-align: center;
            color: var(--text-muted);
        }

        .no-specs h3 {
            font-size: 1.2em;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }

        /* Loading / Error */
        .loading, .error-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            gap: 16px;
            color: var(--text-secondary);
            font-size: 1.1em;
        }

        .error-state { color: #e05050; }

        /* ── Responsive ── */
        @media (max-width: 960px) {
            .product-layout {
                grid-template-columns: 1fr;
                padding: 24px 20px;
            }
            .gallery-col { padding-right: 0; margin-bottom: 28px; }
            .info-col { position: static; }
            .top-bar { padding: 12px 20px; }
            .specs-section { padding: 0 20px 40px; }
        }

        @media (max-width: 600px) {
            .item-title { font-size: 1.5em; }
            .price-main { font-size: 2em; }
            .info-panel { padding: 22px; }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <a class="back-link" href="#" onclick="goBackToInventory(); return false;">&#8592; Back to Inventory</a>
        <a href="index.html" class="site-logo"><img src="PeachOutdoorLogo.png" alt="Peach Outdoor"></a>
    </div>

    <div id="content">
        <div class="loading">Loading item details&#8230;</div>
    </div>

    <script>
        let itemData  = null;
        let specsData = null;

        const urlParams = new URLSearchParams(window.location.search);
        const itemId    = urlParams.get('id');

        if (!itemId) {
            showError('No item specified');
        } else {
            loadItemDetails();
        }

        async function loadItemDetails() {
            try {
                const inventoryResponse = await fetch('inventory.json');
                const inventory = await inventoryResponse.json();

                itemData = inventory.find(item => item.InventoryID == itemId);
                if (!itemData) { showError('Item not found'); return; }

                try {
                    const specsResponse = await fetch('specs.json');
                    specsData = await specsResponse.json();
                } catch (e) {
                    specsData = [];
                }

                displayItem();
            } catch (error) {
                console.error('Error loading item:', error);
                showError('Unable to load item details');
            }
        }

        function displayItem() {
            const specs = specsData.find(s =>
                s.Model === itemData.Model && s.Manufacturer === itemData.Manufacturer
            );

            let photos = [];
            if (itemData.AllPhotos && Array.isArray(itemData.AllPhotos) && itemData.AllPhotos.length > 0) {
                photos = itemData.AllPhotos;
            } else if (itemData.PrimaryPhotoURL) {
                photos = [itemData.PrimaryPhotoURL];
            } else if (itemData.ImageURL) {
                photos = [itemData.ImageURL];
            }

            // Price
            let priceHtml = '';
            if (itemData.Web_Price != null) {
                const fmt = '$' + itemData.Web_Price.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
                priceHtml = '<span class="price-main">' + fmt + '</span>';
                if (itemData.MSRP && itemData.MSRP > itemData.Web_Price) {
                    const msrpFmt = '$' + itemData.MSRP.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
                    priceHtml += '<span class="msrp-price">MSRP ' + msrpFmt + '</span>';
                }
            } else {
                priceHtml = '<span class="price-call">Call for Price</span>';
            }

            // Info pills
            let pillsHtml = '';
            if (itemData.Department) pillsHtml += pill('Type', itemData.Department);
            if (itemData.Used && itemData.Hours != null) pillsHtml += pill('Hours', itemData.Hours.toLocaleString());
            if (itemData.Year)       pillsHtml += pill('Year', itemData.Year);

            document.getElementById('content').innerHTML =
                '<div class="product-layout">' +
                    '<div class="gallery-col">' + renderGallery(photos, itemData.Model) + '</div>' +
                    '<div class="info-col"><div class="info-panel">' +
                        '<div class="item-manufacturer">' + (itemData.Manufacturer || '') + '</div>' +
                        (itemData.Description ? '<h1 class="item-description-title">' + itemData.Description + '</h1>' : '') +
                        '<div class="item-title">' + (itemData.Model || 'Model N/A') + '</div>' +
                        (itemData.Series ? '<div class="item-series">' + itemData.Series + ' Series</div>' : '') +
                        '<div class="item-serial">S/N: ' + (itemData.SerialNumber || 'N/A') + '</div>' +
                        '<div class="price-row">' + priceHtml +
                            '<span class="badge ' + (itemData.Used ? 'badge-used' : 'badge-new') + '">' +
                                (itemData.Used ? 'USED' : 'NEW') +
                            '</span>' +
                        '</div>' +
                        (pillsHtml ? '<div class="info-pills">' + pillsHtml + '</div>' : '') +
                        (itemData.Notes ? '<div class="notes-box">&#128205; ' + itemData.Notes + '</div>' : '') +
                        '<hr class="divider">' +
                        '<button class="btn-chat" onclick="chatAboutItem()">&#128172; Chat About This Item</button>' +
                        '<button class="btn-back" onclick="goBackToInventory()">&#8592; Browse More Items</button>' +
                    '</div></div>' +
                '</div>' +
                '<div class="specs-section">' +
                    '<div class="specs-section-title">Specifications</div>' +
                    (specs ? renderSpecs(specs.Specs) : renderNoSpecs()) +
                '</div>';

            if (photos.length > 1) initGallery(photos);
        }

        /* Gallery */
        function renderGallery(photos, modelName) {
            if (photos.length === 0) {
                return '<div class="main-photo-wrap"><div class="placeholder-icon">&#128668;</div></div>';
            }

            var mainHtml =
                '<div class="main-photo-wrap" id="mainPhotoWrap">' +
                    '<img id="mainPhotoImg" src="' + cloudinaryUrl(photos[0], 'w_1200,h_900,c_limit,q_auto,f_auto') + '" alt="' + modelName + '">' +
                    (photos.length > 1 ?
                        '<button class="photo-nav prev" onclick="changePhoto(-1)">&#8249;</button>' +
                        '<button class="photo-nav next" onclick="changePhoto(1)">&#8250;</button>' +
                        '<div class="photo-counter" id="photoCounter">1 / ' + photos.length + '</div>'
                    : '') +
                '</div>';

            if (photos.length === 1) return mainHtml;

            var thumbsHtml = '<div class="thumbnails-row" id="thumbsRow">';
            for (var i = 0; i < photos.length; i++) {
                thumbsHtml += '<div class="thumb' + (i === 0 ? ' active' : '') + '" onclick="selectPhoto(' + i + ')">' +
                    '<img src="' + cloudinaryUrl(photos[i], 'w_200,h_160,c_fill,q_auto,f_auto') + '" alt="Photo ' + (i+1) + '">' +
                    '</div>';
            }
            thumbsHtml += '</div>';
            return mainHtml + thumbsHtml;
        }

        var currentPhotoIndex = 0;
        var allPhotos = [];

        function initGallery(photos) {
            allPhotos = photos;
            currentPhotoIndex = 0;
        }

        function changePhoto(dir) {
            currentPhotoIndex = (currentPhotoIndex + dir + allPhotos.length) % allPhotos.length;
            selectPhoto(currentPhotoIndex);
        }

        function selectPhoto(index) {
            currentPhotoIndex = index;
            document.getElementById('mainPhotoImg').src = cloudinaryUrl(allPhotos[index], 'w_1200,h_900,c_limit,q_auto,f_auto');
            document.querySelectorAll('.thumb').forEach(function(t, i) {
                t.classList.toggle('active', i === index);
            });
            var counter = document.getElementById('photoCounter');
            if (counter) counter.textContent = (index + 1) + ' / ' + allPhotos.length;
        }

        function cloudinaryUrl(url, transform) {
            if (!url || url.indexOf('res.cloudinary.com') === -1) return url;
            return url.replace('/upload/', '/upload/' + transform + '/');
        }

        /* Specs */
        function renderSpecs(specs) {
            var html = '<div class="specs-grid">';
            for (var category in specs) {
                if (!specs.hasOwnProperty(category)) continue;
                html += '<div class="spec-category"><div class="spec-category-header">' + category + '</div>';
                var items = specs[category];
                for (var label in items) {
                    if (!items.hasOwnProperty(label)) continue;
                    html += '<div class="spec-item"><span class="spec-label">' + label + '</span><span class="spec-value">' + items[label] + '</span></div>';
                }
                html += '</div>';
            }
            html += '</div>';
            return html;
        }

        function renderNoSpecs() {
            return '<div class="no-specs"><h3>Specifications Coming Soon</h3><p>Detailed specs for this model are being updated. Contact us for more information.</p></div>';
        }

        function pill(label, value) {
            return '<div class="pill"><span class="pill-label">' + label + '</span><span class="pill-value">' + value + '</span></div>';
        }

        /* Chat */
        function chatAboutItem() {
            var priceStr = itemData.Web_Price != null
                ? '$' + itemData.Web_Price.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})
                : 'Call for Price';
            var itemInfo = 'Interested in: ' + itemData.Manufacturer + ' ' + itemData.Model +
                ' - Serial #' + (itemData.SerialNumber || 'N/A') +
                ' (ID: ' + itemData.InventoryID + ') - ' + priceStr;

            var clipboardSuccess = false;
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(itemInfo).then(function() { clipboardSuccess = true; }).catch(function(){});
            }
            if (!clipboardSuccess) {
                try {
                    var ta = document.createElement('textarea');
                    ta.value = itemInfo;
                    ta.style.cssText = 'position:fixed;opacity:0';
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand('copy');
                    document.body.removeChild(ta);
                    clipboardSuccess = true;
                } catch(e) {}
            }

            var kenectWrapper = document.getElementById('iframe-wrapper-YMG00J4LwubAnqrXw9851g');
            var anyWrapper    = document.querySelector('[id*="iframe-wrapper"]');
            var target        = kenectWrapper || anyWrapper;

            if (target) {
                target.click();
                setTimeout(function() {
                    alert(clipboardSuccess
                        ? '📋 Item details copied!\n\n' + itemInfo + '\n\nPaste (Ctrl+V) into the message field.'
                        : '💬 Asking about:\n\n' + itemInfo + '\n\n(Copy this text and paste into the message field)');
                }, 800);
                return;
            }
            alert('Please click "Text us!" to chat about:\n\n' + itemInfo);
        }

        function showError(message) {
            document.getElementById('content').innerHTML =
                '<div class="error-state">' +
                    '<div style="font-size:2em">&#9888;&#65039;</div>' +
                    '<h2>' + message + '</h2>' +
                    '<p>Please go back and try again.</p>' +
                    '<button class="btn-back" onclick="goBackToInventory()" style="margin-top:20px;max-width:200px;">Back to Inventory</button>' +
                '</div>';
        }

        function goBackToInventory() {
            var from         = urlParams.get('from');
            var returnParams = urlParams.get('return');
            if (from === 'home') {
                window.location.href = 'index.html';
            } else if (returnParams) {
                window.location.href = 'inventory.html' + returnParams;
            } else {
                window.location.href = 'inventory.html';
            }
        }

        // Update back link text if coming from home
        (function() {
            if (urlParams.get('from') === 'home') {
                var link = document.querySelector('.back-link');
                if (link) link.innerHTML = '&#8592; Back to Home';
            }
        })();
    </script>

    <!-- Live Chat Widget -->
    <script async src='https://bit.ly/3Zyjlxs' type='text/javascript'></script>
</body>
</html>
