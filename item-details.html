<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO: dynamically populated by updatePageSEO() once item data loads -->
    <title id="page-title">Item Details | Peach Outdoor</title>
    <meta id="meta-description" name="description" content="Tractors, mowers, UTVs and outdoor power equipment from Peach Outdoor in Clanton, AL.">
    <meta property="og:type" content="product">
    <meta property="og:title" id="og-title" content="">
    <meta property="og:description" id="og-description" content="">
    <meta property="og:image" id="og-image" content="">
    <meta property="og:url" id="og-url" content="">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="canonical" id="canonical-url" href="">
    <script type="application/ld+json" id="product-schema"></script>

    <!-- jQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

    <style>
        /* ── Design tokens ── */
        :root {
            --charcoal-dark:  #1f1f21;
            --charcoal-mid:   #2c2c2e;
            --charcoal-light: #3a3a3c;
            --charcoal-border:#4a4a4c;
            --accent:         #e07b2a;
            --accent-hover:   #c96a1a;
            --text-primary:   #f0f0f0;
            --text-secondary: #a0a0a4;
            --text-muted:     #707074;
            --gold:           #ffd166;
            --green:          #4caf6e;
            --yellow:         #ffc107;
            --radius-sm:      8px;
            --radius-md:      12px;
            --radius-lg:      20px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--charcoal-dark);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* ── Top bar ── */
        .top-bar {
            background: var(--charcoal-mid);
            border-bottom: 1px solid var(--charcoal-border);
            padding: 14px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.95em;
            font-weight: 500;
            padding: 8px 16px;
            border: 1px solid var(--charcoal-border);
            border-radius: 50px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .back-link:hover {
            color: var(--text-primary);
            border-color: var(--accent);
            background: rgba(224,123,42,0.08);
        }

        .site-logo img {
            height: 52px;
            width: auto;
            display: block;
        }

        /* ── Main two-column layout ── */
        .product-layout {
            display: grid;
            grid-template-columns: 1fr 460px;
            gap: 0;
            max-width: 1380px;
            margin: 0 auto;
            padding: 40px 32px;
            align-items: start;
        }

        /* ── LEFT: Image gallery ── */
        .gallery-col {
            padding-right: 48px;
        }

        .main-photo-wrap {
            position: relative;
            background: var(--charcoal-mid);
            border-radius: var(--radius-lg);
            overflow: hidden;
            aspect-ratio: 4/3;
            border: 1px solid var(--charcoal-border);
            margin-bottom: 14px;
        }

        .main-photo-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: opacity 0.25s ease;
        }

        .placeholder-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            font-size: 6em;
            color: var(--text-muted);
        }

        .photo-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(31,31,33,0.75);
            color: var(--text-primary);
            border: 1px solid var(--charcoal-border);
            width: 46px;
            height: 46px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.6em;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s, background 0.2s;
            backdrop-filter: blur(6px);
        }

        .main-photo-wrap:hover .photo-nav { opacity: 1; }
        .photo-nav:hover { background: rgba(224,123,42,0.85); border-color: var(--accent); }
        .photo-nav.prev { left: 14px; }
        .photo-nav.next { right: 14px; }

        .photo-counter {
            position: absolute;
            bottom: 14px;
            right: 14px;
            background: rgba(31,31,33,0.75);
            color: var(--text-secondary);
            font-size: 0.8em;
            padding: 4px 10px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
        }

        .thumbnails-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .thumb {
            width: 82px;
            height: 68px;
            border-radius: var(--radius-sm);
            overflow: hidden;
            border: 2px solid var(--charcoal-border);
            cursor: pointer;
            transition: border-color 0.2s, transform 0.15s;
            background: var(--charcoal-mid);
            flex-shrink: 0;
        }

        .thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .thumb:hover { border-color: var(--text-secondary); transform: scale(1.04); }
        .thumb.active { border-color: var(--accent); }

        /* ── RIGHT: Sticky info panel ── */
        .info-col {
            position: sticky;
            top: 72px;
        }

        .info-panel {
            background: var(--charcoal-mid);
            border: 1px solid var(--charcoal-border);
            border-radius: var(--radius-lg);
            padding: 30px;
        }

        .item-manufacturer {
            font-size: 0.82em;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 6px;
        }

        .item-title {
            font-size: 0.92em;
            font-weight: 600;
            line-height: 1.2;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .item-series {
            font-size: 0.92em;
            color: var(--text-secondary);
            margin-bottom: 14px;
        }

        .item-description-title {
            font-size: 1.85em;
            font-weight: 700;
            line-height: 1.25;
            color: var(--text-primary);
            margin-bottom: 14px;
        }

        .item-serial {
            font-size: 0.85em;
            color: var(--text-muted);
            font-family: 'Courier New', monospace;
            letter-spacing: 0.06em;
            margin-bottom: 20px;
            padding: 7px 12px;
            background: var(--charcoal-light);
            border-radius: var(--radius-sm);
            display: inline-block;
        }

        .price-row {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .price-main {
            font-size: 2.3em;
            font-weight: 800;
            color: var(--gold);
        }

        .price-call {
            font-size: 1.35em;
            font-weight: 700;
            color: var(--gold);
        }

        .msrp-price {
            font-size: 0.95em;
            color: var(--text-muted);
            text-decoration: line-through;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .badge-new  { background: var(--green);  color: #fff; }
        .badge-used { background: var(--yellow); color: #1f1f21; }

        .info-pills {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 22px;
        }

        .pill {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: var(--charcoal-light);
            border: 1px solid var(--charcoal-border);
            border-radius: var(--radius-md);
            padding: 10px 18px;
            min-width: 85px;
        }

        .pill-label {
            font-size: 0.7em;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.09em;
            margin-bottom: 3px;
        }

        .pill-value {
            font-size: 0.92em;
            font-weight: 600;
            color: var(--text-primary);
        }

        .divider {
            border: none;
            border-top: 1px solid var(--charcoal-border);
            margin: 20px 0;
        }

        .item-description {
            font-size: 0.93em;
            line-height: 1.65;
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        .notes-box {
            background: var(--charcoal-light);
            border-left: 3px solid var(--accent);
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            padding: 12px 16px;
            font-size: 0.88em;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .about-this-item {
            background: var(--charcoal-light);
            border-radius: var(--radius-sm);
            padding: 16px 20px;
            margin-bottom: 20px;
        }

        .about-this-item-title {
            font-size: 0.78em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--accent);
            margin-bottom: 8px;
        }

        .about-this-item-body {
            font-size: 0.92em;
            color: var(--text-secondary);
            line-height: 1.7;
            white-space: pre-wrap;
        }

        .btn-chat {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius-md);
            font-size: 1.05em;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-chat:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }

        .btn-back {
            width: 100%;
            padding: 14px;
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--charcoal-border);
            border-radius: var(--radius-md);
            font-size: 0.95em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-back:hover {
            border-color: var(--text-secondary);
            color: var(--text-primary);
            background: var(--charcoal-light);
        }

        /* ── Specs section (full width below) ── */
        .specs-section {
            max-width: 1380px;
            margin: 0 auto;
            padding: 0 32px 60px;
        }

        .specs-section-title {
            font-size: 1.25em;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .specs-section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--charcoal-border);
        }

        .specs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 16px;
        }

        .spec-category {
            background: var(--charcoal-mid);
            border: 1px solid var(--charcoal-border);
            border-radius: var(--radius-md);
            overflow: hidden;
        }

        .spec-category-header {
            background: var(--charcoal-light);
            padding: 12px 20px;
            font-size: 0.82em;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--accent);
            border-bottom: 1px solid var(--charcoal-border);
        }

        .spec-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 11px 20px;
            border-bottom: 1px solid var(--charcoal-border);
            gap: 16px;
        }

        .spec-item:last-child { border-bottom: none; }

        .spec-label {
            font-size: 0.88em;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .spec-value {
            font-size: 0.88em;
            color: var(--text-primary);
            font-weight: 600;
            text-align: right;
        }

        .no-specs {
            background: var(--charcoal-mid);
            border: 1px solid var(--charcoal-border);
            border-radius: var(--radius-md);
            padding: 50px;
            text-align: center;
            color: var(--text-muted);
        }

        .no-specs h3 {
            font-size: 1.2em;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }

        /* Loading / Error */
        .loading, .error-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            gap: 16px;
            color: var(--text-secondary);
            font-size: 1.1em;
        }

        .error-state { color: #e05050; }

        /* ── Responsive ── */
        @media (max-width: 960px) {
            .product-layout {
                grid-template-columns: 1fr;
                padding: 24px 20px;
            }
            .gallery-col { padding-right: 0; margin-bottom: 28px; }
            .info-col { position: static; }
            .top-bar { padding: 12px 20px; }
            .specs-section { padding: 0 20px 40px; }
        }

        @media (max-width: 600px) {
            .item-title { font-size: 1.5em; }
            .price-main { font-size: 2em; }
            .info-panel { padding: 22px; }
        }
        /* ── Get a Quote button ── */
        .btn-quote {
            width: 100%;
            padding: 16px;
            background: #2a7d2e;
            color: #fff;
            border: none;
            border-radius: var(--radius-md);
            font-size: 1.05em;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-quote:hover {
            background: #235f26;
            transform: translateY(-2px);
        }

        /* ── Inquiry Modal ── */
        .inquiry-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.65);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .inquiry-overlay.open { display: flex; }
        .inquiry-modal {
            background: var(--charcoal-card, #1e1e1e);
            border-radius: 12px;
            padding: 32px 28px 24px;
            width: 100%;
            max-width: 520px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            color: var(--text-primary, #f0f0f0);
        }
        .inquiry-modal h2 {
            margin: 0 0 4px;
            font-size: 1.3em;
            color: #fff;
        }
        .inquiry-modal .inquiry-subtitle {
            font-size: 0.88em;
            color: var(--text-secondary, #aaa);
            margin-bottom: 20px;
        }
        .inquiry-modal .close-btn {
            position: absolute;
            top: 14px; right: 18px;
            background: none;
            border: none;
            font-size: 1.5em;
            color: var(--text-secondary, #aaa);
            cursor: pointer;
            line-height: 1;
        }
        .inquiry-modal .close-btn:hover { color: #fff; }
        .inq-row { display: flex; gap: 12px; margin-bottom: 12px; }
        .inq-row .inq-field { flex: 1; }
        .inq-field { margin-bottom: 12px; }
        .inq-field label {
            display: block;
            font-size: 0.8em;
            font-weight: 600;
            color: var(--text-secondary, #aaa);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .inq-field input, .inq-field select {
            width: 100%;
            padding: 10px 12px;
            background: var(--charcoal-light, #2a2a2a);
            border: 1px solid var(--charcoal-border, #3a3a3a);
            border-radius: 6px;
            color: #fff;
            font-size: 0.95em;
            box-sizing: border-box;
        }
        .inq-field input:focus, .inq-field select:focus {
            outline: none;
            border-color: var(--accent, #e87722);
        }
        .inq-field input::placeholder { color: #666; }
        .inq-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 12px 0 20px;
            font-size: 0.88em;
            color: var(--text-secondary, #aaa);
            cursor: pointer;
        }
        .inq-checkbox input { width: auto; margin: 0; }
        .btn-inq-submit {
            width: 100%;
            padding: 14px;
            background: #2a7d2e;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-inq-submit:hover { background: #235f26; }
        .btn-inq-submit:disabled { background: #555; cursor: not-allowed; }
        .inq-success {
            text-align: center;
            padding: 20px 0 10px;
        }
        .inq-success .inq-check { font-size: 3em; }
        .inq-success h3 { margin: 12px 0 6px; color: #4caf50; }
        .inq-success p { color: var(--text-secondary, #aaa); font-size: 0.9em; }
    </style>
</head>
<body>

    <div class="top-bar">
        <a class="back-link" href="#" onclick="goBackToInventory(); return false;">&#8592; Back to Inventory</a>
        <a href="index.html" class="site-logo"><img src="PeachOutdoorLogo.png" alt="Peach Outdoor"></a>
    </div>

    <div id="content">
        <div class="loading">Loading item details&#8230;</div>
    </div>

    <script>
        let itemData  = null;
        let specsData = null;

        const urlParams = new URLSearchParams(window.location.search);
        const itemId    = urlParams.get('id');

        // Pre-rendered pages embed item data as window.__INITIAL_ITEM__ and have
        // no ?id= query param. Legacy /item-details.html?id=N URLs still work via
        // the fetch path inside loadItemDetails().
        if (window.__INITIAL_ITEM__ || itemId) {
            loadItemDetails();
        } else {
            showError('No item specified');
        }

        async function loadItemDetails() {
            try {
                if (window.__INITIAL_ITEM__) {
                    itemData = window.__INITIAL_ITEM__;
                } else {
                    const inventoryResponse = await fetch('inventory.json');
                    const inventory = await inventoryResponse.json();
                    itemData = inventory.find(item => item.InventoryID == itemId);
                    if (!itemData) { showError('Item not found'); return; }
                }

                // Make item info available to the inquiry modal
                window._currentInqItem = {
                    id:        itemData.InventoryID || '',
                    make:      itemData.Manufacturer || '',
                    model:     itemData.Model || '',
                    condition: itemData.Used ? 'Used' : 'New',
                    serial:    itemData.SerialNumber || '',
                    location:  itemData.Location || itemData.Branch || ''
                };

                try {
                    const specsResponse = await fetch('specs.json');
                    specsData = await specsResponse.json();
                } catch (e) {
                    specsData = [];
                }

                displayItem();
            } catch (error) {
                console.error('Error loading item:', error);
                showError('Unable to load item details');
            }
        }

        // Slug logic must mirror build.js makeSlug() exactly so canonicals match.
        function makeItemSlug(item) {
            const base = item.Description
                || [item.Manufacturer, item.Model].filter(Boolean).join(' ')
                || 'item';
            let slug = base
                .toLowerCase()
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/^-+|-+$/g, '');
            if (slug.length > 60) slug = slug.slice(0, 60).replace(/-+$/, '');
            return slug + '-' + item.InventoryID;
        }

        function updatePageSEO(item) {
            // Build a clean human title from available fields
            const titleBase = [item.Manufacturer, item.Model].filter(Boolean).join(' ');
            const headline  = item.Description ? item.Description : titleBase;

            // Price string for title and meta
            let priceText;
            if (item.Web_Price != null) {
                priceText = '$' + Number(item.Web_Price).toLocaleString('en-US', {
                    minimumFractionDigits: 2, maximumFractionDigits: 2
                });
            } else {
                priceText = 'Call for Price';
            }

            const condition = item.Used ? 'Used' : 'New';
            const pageTitle = headline + ' — ' + priceText + ' | Peach Outdoor';

            document.title = pageTitle;
            const ogTitleEl = document.getElementById('og-title');
            if (ogTitleEl) ogTitleEl.setAttribute('content', pageTitle);

            // Meta description: prefer AboutThisItem, otherwise build a sensible default
            let description;
            if (item.AboutThisItem && item.AboutThisItem.length > 20) {
                description = item.AboutThisItem.replace(/\s+/g, ' ').trim();
                if (description.length > 160) {
                    description = description.slice(0, 157).trim() + '…';
                }
            } else {
                description = condition + ' ' + headline + ' for sale at Peach Outdoor in Clanton, AL. ' +
                              priceText + '. Call 205-280-8838.';
            }
            const metaDescEl = document.getElementById('meta-description');
            if (metaDescEl) metaDescEl.setAttribute('content', description);
            const ogDescEl = document.getElementById('og-description');
            if (ogDescEl) ogDescEl.setAttribute('content', description);

            // Pick the first photo for social previews
            let primaryImage = '';
            if (item.AllPhotos && Array.isArray(item.AllPhotos) && item.AllPhotos.length > 0) {
                primaryImage = item.AllPhotos[0];
            } else if (item.PrimaryPhotoURL) {
                primaryImage = item.PrimaryPhotoURL;
            }
            if (primaryImage) {
                const ogImgEl = document.getElementById('og-image');
                if (ogImgEl) ogImgEl.setAttribute('content', primaryImage);
            }

            // Canonical / og:url — always point to the pre-rendered clean URL
            // so legacy /item-details.html?id=N pages canonicalize correctly.
            const canonicalHref = 'https://peachoutdoor.com/inventory/' + makeItemSlug(item);
            const canonEl = document.getElementById('canonical-url');
            if (canonEl) canonEl.setAttribute('href', canonicalHref);
            const ogUrlEl = document.getElementById('og-url');
            if (ogUrlEl) ogUrlEl.setAttribute('content', canonicalHref);

            // JSON-LD structured data — Product schema
            const schema = {
                "@context": "https://schema.org/",
                "@type": "Product",
                "name": headline,
                "description": (item.AboutThisItem || (condition + ' ' + headline + ' available at Peach Outdoor')),
                "image": (item.AllPhotos && item.AllPhotos.length ? item.AllPhotos
                          : (primaryImage ? [primaryImage] : [])),
                "sku": String(item.InventoryID || ''),
                "itemCondition": item.Used
                    ? "https://schema.org/UsedCondition"
                    : "https://schema.org/NewCondition",
                "offers": {
                    "@type": "Offer",
                    "url": canonicalHref,
                    "priceCurrency": "USD",
                    "availability": "https://schema.org/InStock",
                    "seller": {
                        "@type": "AutoDealer",
                        "name": "Peach Outdoor",
                        "telephone": "+1-205-280-8838",
                        "address": {
                            "@type": "PostalAddress",
                            "streetAddress": "1940 Big M Blvd",
                            "addressLocality": "Clanton",
                            "addressRegion": "AL",
                            "postalCode": "35046",
                            "addressCountry": "US"
                        }
                    }
                }
            };

            if (item.Manufacturer) {
                schema.brand = { "@type": "Brand", "name": item.Manufacturer };
            }
            if (item.Model)        schema.model        = item.Model;
            if (item.SerialNumber) schema.serialNumber = item.SerialNumber;
            if (item.Department)   schema.category     = item.Department;
            if (item.MSRP)         schema.offers.priceSpecification = {
                "@type": "PriceSpecification",
                "priceCurrency": "USD",
                "price": item.MSRP,
                "valueAddedTaxIncluded": false
            };
            // Only include a numeric price if Web_Price is set; omit for "Call for Price"
            if (item.Web_Price != null) {
                schema.offers.price = Number(item.Web_Price);
            } else {
                // For "Call for Price" items, indicate price on request
                schema.offers.availability = "https://schema.org/InStock";
                schema.offers.priceSpecification = schema.offers.priceSpecification || {
                    "@type": "PriceSpecification",
                    "priceCurrency": "USD"
                };
            }

            const schemaEl = document.getElementById('product-schema');
            if (schemaEl) schemaEl.textContent = JSON.stringify(schema);
        }

        function displayItem() {
            updatePageSEO(itemData);

            const specLookup = itemData.SpecModel || itemData.Model;
            const specs = specsData.find(s => s.Model === specLookup);

            let photos = [];
            if (itemData.AllPhotos && Array.isArray(itemData.AllPhotos) && itemData.AllPhotos.length > 0) {
                photos = itemData.AllPhotos;
            } else if (itemData.PrimaryPhotoURL) {
                photos = [itemData.PrimaryPhotoURL];
            } else if (itemData.ImageURL) {
                photos = [itemData.ImageURL];
            }

            // Price
            let priceHtml = '';
            if (itemData.Web_Price != null) {
                const fmt = '$' + itemData.Web_Price.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
                priceHtml = '<span class="price-main">' + fmt + '</span>';
                if (itemData.MSRP && itemData.MSRP > itemData.Web_Price) {
                    const msrpFmt = '$' + itemData.MSRP.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
                    priceHtml += '<span class="msrp-price">MSRP ' + msrpFmt + '</span>';
                }
            } else {
                priceHtml = '<span class="price-call">Call for Price</span>';
            }

            // Info pills
            let pillsHtml = '';
            if (itemData.Department) pillsHtml += pill('Type', itemData.Department);
            if (itemData.Used && itemData.Hours != null) pillsHtml += pill('Hours', itemData.Hours.toLocaleString());
            if (itemData.Year)       pillsHtml += pill('Year', itemData.Year);

            document.getElementById('content').innerHTML =
                '<div class="product-layout">' +
                    '<div class="gallery-col">' + renderGallery(photos, itemData.Model) + '</div>' +
                    '<div class="info-col"><div class="info-panel">' +
                        '<div class="item-manufacturer">' + (itemData.Manufacturer || '') + '</div>' +
                        (itemData.Description ? '<h1 class="item-description-title">' + itemData.Description + '</h1>' : '') +
                        '<div class="item-title">' + (itemData.Model || 'Model N/A') + '</div>' +
                        (itemData.Series ? '<div class="item-series">' + itemData.Series + ' Series</div>' : '') +
                        '<div class="item-serial">S/N: ' + (itemData.SerialNumber || 'N/A') + '</div>' +
                        '<div class="price-row">' + priceHtml +
                            '<span class="badge ' + (itemData.Used ? 'badge-used' : 'badge-new') + '">' +
                                (itemData.Used ? 'USED' : 'NEW') +
                            '</span>' +
                        '</div>' +
                        (pillsHtml ? '<div class="info-pills">' + pillsHtml + '</div>' : '') +
                        (itemData.Notes ? '<div class="notes-box">&#128205; ' + itemData.Notes + '</div>' : '') +
                        (itemData.AboutThisItem ? '<div class="about-this-item"><div class="about-this-item-title">About This Item</div><div class="about-this-item-body">' + itemData.AboutThisItem + '</div></div>' : '') +
                        '<hr class="divider">' +
                        '<button class="btn-quote" onclick="openInquiryModal()">&#128203; Get A Quote</button>' +
                        '<button class="btn-chat" onclick="chatAboutItem()">&#128172; Chat About This Item</button>' +
                        '<button class="btn-back" onclick="goBackToInventory()">&#8592; Browse More Items</button>' +
                    '</div></div>' +
                '</div>' +
                '<div class="specs-section">' +
                    '<div class="specs-section-title">Specifications</div>' +
                    (specs ? renderSpecs(specs.Specs) : renderNoSpecs()) +
                '</div>';

            if (photos.length > 1) initGallery(photos);
        }

        /* Gallery */
        function renderGallery(photos, modelName) {
            if (photos.length === 0) {
                return '<div class="main-photo-wrap"><div class="placeholder-icon">&#128668;</div></div>';
            }

            var mainHtml =
                '<div class="main-photo-wrap" id="mainPhotoWrap">' +
                    '<img id="mainPhotoImg" src="' + cloudinaryUrl(photos[0]) + '" alt="' + modelName + '">' +
                    (photos.length > 1 ?
                        '<button class="photo-nav prev" onclick="changePhoto(-1)">&#8249;</button>' +
                        '<button class="photo-nav next" onclick="changePhoto(1)">&#8250;</button>' +
                        '<div class="photo-counter" id="photoCounter">1 / ' + photos.length + '</div>'
                    : '') +
                '</div>';

            if (photos.length === 1) return mainHtml;

            var thumbsHtml = '<div class="thumbnails-row" id="thumbsRow">';
            for (var i = 0; i < photos.length; i++) {
                thumbsHtml += '<div class="thumb' + (i === 0 ? ' active' : '') + '" onclick="selectPhoto(' + i + ')">' +
                    '<img src="' + cloudinaryUrl(photos[i]) + '" alt="Photo ' + (i+1) + '">' +
                    '</div>';
            }
            thumbsHtml += '</div>';
            return mainHtml + thumbsHtml;
        }

        var currentPhotoIndex = 0;
        var allPhotos = [];

        function initGallery(photos) {
            allPhotos = photos;
            currentPhotoIndex = 0;
        }

        function changePhoto(dir) {
            currentPhotoIndex = (currentPhotoIndex + dir + allPhotos.length) % allPhotos.length;
            selectPhoto(currentPhotoIndex);
        }

        function selectPhoto(index) {
            currentPhotoIndex = index;
            document.getElementById('mainPhotoImg').src = cloudinaryUrl(allPhotos[index]);
            document.querySelectorAll('.thumb').forEach(function(t, i) {
                t.classList.toggle('active', i === index);
            });
            var counter = document.getElementById('photoCounter');
            if (counter) counter.textContent = (index + 1) + ' / ' + allPhotos.length;
        }

        // URLs are pre-optimized in the database with f_auto,q_auto,w_1200 —
        // no client-side transform injection needed. Return URL unchanged.
        function cloudinaryUrl(url) {
            return url;
        }

        /* Specs */
        function renderSpecs(specs) {
            var html = '<div class="specs-grid">';
            for (var category in specs) {
                if (!specs.hasOwnProperty(category)) continue;
                html += '<div class="spec-category"><div class="spec-category-header">' + category + '</div>';
                var items = specs[category];
                for (var label in items) {
                    if (!items.hasOwnProperty(label)) continue;
                    html += '<div class="spec-item"><span class="spec-label">' + label + '</span><span class="spec-value">' + items[label] + '</span></div>';
                }
                html += '</div>';
            }
            html += '</div>';
            return html;
        }

        function renderNoSpecs() {
            return '<div class="no-specs"><h3>Specifications Coming Soon</h3><p>Detailed specs for this model are being updated. Contact us for more information.</p></div>';
        }

        function pill(label, value) {
            return '<div class="pill"><span class="pill-label">' + label + '</span><span class="pill-value">' + value + '</span></div>';
        }

        /* Chat */
        function chatAboutItem() {
            var priceStr = itemData.Web_Price != null
                ? '$' + itemData.Web_Price.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})
                : 'Call for Price';
            var itemInfo = 'Interested in: ' + itemData.Manufacturer + ' ' + itemData.Model +
                ' - Serial #' + (itemData.SerialNumber || 'N/A') +
                ' (ID: ' + itemData.InventoryID + ') - ' + priceStr;

            var clipboardSuccess = false;
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(itemInfo).then(function() { clipboardSuccess = true; }).catch(function(){});
            }
            if (!clipboardSuccess) {
                try {
                    var ta = document.createElement('textarea');
                    ta.value = itemInfo;
                    ta.style.cssText = 'position:fixed;opacity:0';
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand('copy');
                    document.body.removeChild(ta);
                    clipboardSuccess = true;
                } catch(e) {}
            }

            if (clipboardSuccess) {
                alert('📋 Item details copied to your clipboard!\n\n' + itemInfo + '\n\n' +
                      'Next steps:\n' +
                      '1. Click the "Text us!" button at the bottom-right of the screen\n' +
                      '2. Select "Peach Outdoor Sales"\n' +
                      '3. Enter your Name and Phone Number\n' +
                      '4. Click in the message area and Paste (Ctrl+V on PC, or press and hold then Paste on phone)\n' +
                      '5. Click SEND\n\n' +
                      'We\'ll get back to you shortly!');
            }
        }

        function showError(message) {
            document.getElementById('content').innerHTML =
                '<div class="error-state">' +
                    '<div style="font-size:2em">&#9888;&#65039;</div>' +
                    '<h2>' + message + '</h2>' +
                    '<p>Please go back and try again.</p>' +
                    '<button class="btn-back" onclick="goBackToInventory()" style="margin-top:20px;max-width:200px;">Back to Inventory</button>' +
                '</div>';
        }

        function goBackToInventory() {
            var from         = urlParams.get('from');
            var returnParams = urlParams.get('return');
            if (from === 'home') {
                window.location.href = 'index.html';
            } else if (returnParams) {
                window.location.href = 'inventory.html' + returnParams;
            } else {
                window.location.href = 'inventory.html';
            }
        }

        // Update back link text if coming from home
        (function() {
            if (urlParams.get('from') === 'home') {
                var link = document.querySelector('.back-link');
                if (link) link.innerHTML = '&#8592; Back to Home';
            }
        })();
    </script>

<div class="inquiry-overlay" id="inquiryOverlay">

        </div>

      </div>

        <input type="checkbox" id="inqNewsletter" checked>
        Sign me up for the Peach Outdoor newsletter
      </label>

<script>
  // ── Inquiry Modal ──────────────────────────────
  var _inqItem = {};

  function openInquiryModal() {
    var item = window._currentInqItem || {};
    document.getElementById('inquiryItemLabel').textContent =
      (item.make || '') + (item.model ? ' ' + item.model : '') || 'Item Inquiry';
    document.getElementById('inqFirstName').value = '';
    document.getElementById('inqLastName').value = '';
    document.getElementById('inqPhone').value = '';
    document.getElementById('inqEmail').value = '';
    document.getElementById('inqAddress').value = '';
    document.getElementById('inqCity').value = '';
    document.getElementById('inqState').value = '';
    document.getElementById('inqZip').value = '';
    document.getElementById('inqNewsletter').checked = true;
    document.getElementById('inqMessage').value = '';
    document.getElementById('inquiryFormArea').style.display = '';
    document.getElementById('inquirySuccess').style.display = 'none';
    document.getElementById('inqSubmitBtn').disabled = false;
    document.getElementById('inqSubmitBtn').textContent = 'Send My Inquiry';
    document.getElementById('inquiryOverlay').classList.add('open');
  }

  function closeInquiryModal() {
    document.getElementById('inquiryOverlay').classList.remove('open');
  }

  document.getElementById('inquiryOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeInquiryModal();
  });

  async function submitInquiry() {
    var firstName = document.getElementById('inqFirstName').value.trim();
    var lastName  = document.getElementById('inqLastName').value.trim();
    var phone     = document.getElementById('inqPhone').value.trim();
    var email     = document.getElementById('inqEmail').value.trim();

    if (!firstName || !lastName || !phone || !email) {
      alert('Please fill in First Name, Last Name, Phone, and Email.');
      return;
    }

    var btn = document.getElementById('inqSubmitBtn');
    btn.disabled = true;
    btn.textContent = 'Sending...';

    var item = window._currentInqItem || {};
    var itemUrl = window.location.href;

    var payload = {
      firstName:      firstName,
      lastName:       lastName,
      phone:          phone,
      email:          email,
      address:        document.getElementById('inqAddress').value.trim(),
      city:           document.getElementById('inqCity').value.trim(),
      state:          document.getElementById('inqState').value.trim(),
      zip:            document.getElementById('inqZip').value.trim(),
      interestedMake:  item.make  || '',
      interestedModel: item.model || '',
      condition:      item.condition || 'New',
      serialNumber:   item.serial || '',
      itemLocation:   item.location || '',
      location:       'Clanton',
      itemId:         item.id   || '',
      itemUrl:        itemUrl,
      newsletterOptIn: document.getElementById('inqNewsletter').checked,
      message:        document.getElementById('inqMessage').value.trim()
    };

    try {
      var resp = await fetch('/.netlify/functions/send-inquiry', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      var result = await resp.json();
      if (result.success) {
        document.getElementById('inquiryFormArea').style.display = 'none';
        document.getElementById('inquirySuccess').style.display = '';
      } else {
        alert('There was a problem sending your inquiry. Please call us directly.');
        btn.disabled = false;
        btn.textContent = 'Send My Inquiry';
      }
    } catch (err) {
      alert('There was a problem sending your inquiry. Please call us directly.');
      btn.disabled = false;
      btn.textContent = 'Send My Inquiry';
    }
  }
</script>
